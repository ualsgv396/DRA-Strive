server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # index.html: nunca cachear — es el punto de entrada de la SPA
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma        "no-cache";
    add_header Expires       "0";
    try_files $uri =404;
  }

  # Assets de Vite: llevan hash en el nombre, se pueden cachear para siempre
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Resto de rutas: fallback a index.html para que React Router maneje el path
  location / {
    try_files $uri $uri/ /index.html;
  }
}
