spring.application.name=strive

# Base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://strive-mysql:3306/strive_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gymuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gympass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Reintentos de conexión: da tiempo a MySQL para estar completamente listo
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Puerto del servidor
server.port=8080

# JWT
app.jwt.secret=YzJWeWRtbGpaUzF6YldGeWRDMXpkSEpwZG1VdFkyOXVaR2x1WjI1bGN3PT0=
app.jwt.expiration-ms=86400000
app.invites.base-url=http://localhost:5173/amigos?invite=
app.invites.expiration-minutes=30

# Jackson: fechas como ISO-8601 en lugar de arrays de componentes
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging temporal para diagnosticar auth (quitar despues)
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
