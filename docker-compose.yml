services:

  mysql:
    image: mysql:8.0
    container_name: strive-mysql
    restart: always
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - strive_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    container_name: strive-backend
    restart: always
    ports:
      - "8080:8080"
    env_file: .env 
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Docker Compose busca automáticamente en el archivo .env de la raíz
        # para inyectar este valor durante el "npm run build" de Vite
        - VITE_API_URL=${VITE_API_URL}
    container_name: strive-frontend
    restart: always
    ports:
      - "5173:80"
    env_file: .env  
    depends_on:
      - backend

volumes:
  strive_mysql_data: